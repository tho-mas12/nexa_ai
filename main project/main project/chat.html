<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Friday AI – Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=DM+Serif+Display&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root {
  --pink-bg:      #121826; /* Sidebar background - dark slate */
  --white-bg:     #0b0f19; /* Main panel background - deep midnight slate */
  --purple:       #6366f1; /* Accent primary */
  --purple-light: #818cf8; /* Accent light */
  --purple-pale:  rgba(99, 102, 241, 0.12); /* Badge background */
  --pink-btn:     rgba(99, 102, 241, 0.12); /* Pill buttons background */
  --pink-mid:     rgba(99, 102, 241, 0.22); /* Pill buttons hover */
  --text-dark:    #ffffff; /* Primary headings and text */
  --text-mid:     #cbd5e1; /* Body text */
  --text-muted:   #64748b; /* Subtext */
  --border:       rgba(255, 255, 255, 0.06);
  --shadow:       rgba(0, 0, 0, 0.4);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }

body {
  font-family: 'Poppins', sans-serif;
  background: #070a13;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  color: var(--text-mid);
}

/* ── APP SHELL ── */
.app-shell {
  display: flex;
  width: 980px;
  height: 610px;
  border-radius: 2.2rem;
  overflow: hidden;
  box-shadow: 
    0 28px 72px rgba(0, 0, 0, 0.5),
    0 0 40px rgba(99, 102, 241, 0.03);
  background: var(--white-bg);
  position: relative;
  border: 1px solid rgba(255, 255, 255, 0.05);
}

.sidebar {
  width: 225px;
  min-width: 225px;
  background: var(--pink-bg);
  display: flex;
  flex-direction: column;
  padding: 2rem 1.5rem;
  flex-shrink: 0;
  position: relative;
  z-index: 10;
  border-right: 1px solid rgba(255, 255, 255, 0.04);
}

.logo {
  display: flex; align-items: center; gap: .55rem;
  margin-bottom: 2.5rem;
}
.logo img {
  width: 28px;
  height: 28px;
  border-radius: 8px;
  object-fit: cover;
  filter: drop-shadow(0 0 8px rgba(99, 102, 241, 0.4));
}
.logo-icon {
  width: 40px; height: 40px; border-radius: 11px;
  background: linear-gradient(135deg, #3b82f6, #6366f1);
  display: flex; align-items: center; justify-content: center;
  font-weight: 900; font-size: 1.35rem; color: #fff; font-style: italic;
}
.logo-text {
  font-size: 1.3rem;
  font-weight: 800;
  color: var(--text-dark);
  letter-spacing: -0.5px;
  background: linear-gradient(135deg, #ffffff 60%, #a5b4fc 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.nav { list-style: none; display: flex; flex-direction: column; gap: .3rem; flex: 1; }
.nav-item {
  display: flex; align-items: center; gap: .75rem;
  padding: .65rem .9rem; border-radius: .75rem;
  font-size: .95rem; font-weight: 600; color: var(--text-mid);
  cursor: pointer; transition: background .2s, color .2s;
  position: relative;
}
.nav-item:hover { background: rgba(99, 102, 241, 0.08); color: var(--purple-light); }
.nav-item.active { color: var(--purple-light); }
.nav-item.active::after {
  content: ''; position: absolute; right: -1.5rem; top: 50%;
  transform: translateY(-50%); width: 3px; height: 60%;
  background: var(--purple-light); border-radius: 4px;
}
.nav-icon { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 1.8; flex-shrink: 0; }

.profile {
  display: flex; align-items: center; gap: .75rem;
  margin-top: auto; padding-top: 1.5rem;
}
.profile-label { font-weight: 700; font-size: .95rem; color: var(--text-dark); }
.avatar { width: 36px; height: 36px; border-radius: 50%; overflow: hidden; flex-shrink: 0; }

/* ── MAIN ── */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
  background: var(--white-bg);
}

/* ── TOPBAR ── */
.topbar {
  display: flex; justify-content: space-between; align-items: flex-start;
  padding: 1.6rem 2.5rem 1rem;
  flex-shrink: 0;
}
.greeting-title {
  font-size: .72rem; font-weight: 800;
  letter-spacing: .12em; text-transform: uppercase; color: var(--text-dark);
}
.greeting-sub { font-size: .8rem; color: var(--text-muted); margin-top: .1rem; font-style: italic; }

.topbar-right { display: flex; align-items: center; gap: .75rem; }

/* mood badge */
.mood-badge {
  display: flex; align-items: center; gap: .4rem;
  padding: .28rem .75rem;
  background: var(--purple-pale);
  border: 1px solid rgba(99, 102, 241, 0.15);
  border-radius: 20px;
  font-size: .72rem; font-weight: 700; color: var(--purple-light);
}
.mood-orb {
  width: 7px; height: 7px; border-radius: 50%;
  background: #22c55e; box-shadow: 0 0 6px #22c55e;
  transition: all .4s;
}
.mood-orb.thinking  { background: var(--purple-light); box-shadow: 0 0 8px var(--purple-light); animation: orb-pulse 1s infinite; }
.mood-orb.generating{ background: #f59e0b; box-shadow: 0 0 8px #f59e0b; animation: orb-pulse .6s infinite; }
@keyframes orb-pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.5)} }

.logout-btn {
  display: flex; align-items: center; gap: .45rem;
  background: none; border: none; cursor: pointer;
  font-family: 'Poppins', sans-serif;
  font-size: .9rem; font-weight: 700; color: var(--text-mid);
  transition: color .2s;
}
.logout-btn:hover { color: var(--purple); }
.logout-btn svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 1.8; }

/* ── WELCOME SCREEN ── */
#welcome-screen {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: var(--white-bg);
  z-index: 5;
  transition: opacity .5s, transform .5s;
  padding-bottom: 120px;
}
#welcome-screen.hiding { opacity: 0; transform: scale(.97); pointer-events: none; }

.welcome-robot {
  width: 200px; height: auto;
  opacity: .85;
  filter: drop-shadow(0 8px 24px rgba(99, 102, 241, 0.25));
  animation: bob 3s ease-in-out infinite;
}
@keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }

.welcome-text {
  font-family: 'Poppins', sans-serif;
  font-size: 1.55rem; color: var(--text-dark);
  line-height: 1.3; text-align: center; margin-top: .6rem;
  font-weight: 800;
}

/* ── CHAT AREA ── */
.chat-area {
  flex: 1; overflow-y: auto;
  padding: 1rem 2.5rem;
  display: flex; flex-direction: column; gap: 1.1rem;
  scroll-behavior: smooth;
}
.chat-area::-webkit-scrollbar { width: 4px; }
.chat-area::-webkit-scrollbar-thumb { background: var(--pink-btn); border-radius: 2px; }

/* ── MESSAGES ── */
.msg-row {
  display: flex; gap: .7rem; align-items: flex-end;
  animation: msg-in .38s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes msg-in { from{opacity:0;transform:translateY(14px) scale(.97)} to{opacity:1;transform:none} }
.msg-row.user { flex-direction: row-reverse; }

.msg-avatar {
  width: 30px; height: 30px; border-radius: 50%;
  flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  font-size: .72rem; font-weight: 800;
}
.msg-avatar.nexa-av, .msg-avatar.friday-av {
  background: linear-gradient(135deg, #3b82f6, #6366f1);
  color: #fff;
  box-shadow: 0 2px 10px rgba(99, 102, 241, 0.35);
  font-style: italic;
}
.msg-avatar.user-av {
  background: rgba(99, 102, 241, 0.15);
  color: var(--purple-light);
  overflow: hidden;
}
.msg-avatar.user-av svg { width: 30px; height: 30px; }

.bubble-wrap { max-width: 68%; display: flex; flex-direction: column; gap: .3rem; }
.msg-row.user .bubble-wrap { align-items: flex-end; }

.bubble {
  padding: .75rem 1rem;
  border-radius: 18px;
  font-size: .875rem; line-height: 1.65;
  position: relative;
}
.bubble.nexa-bubble, .bubble.friday-bubble {
  background: rgba(30, 41, 59, 0.45);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
  color: var(--text-dark);
}
.bubble.user-bubble {
  background: linear-gradient(135deg, #4f46e5, #7c3aed);
  border-bottom-right-radius: 4px;
  color: #fff;
  box-shadow: 0 4px 16px rgba(99, 102, 241, 0.2);
}

/* bubble action row */
.bubble-actions {
  display: flex; gap: .35rem;
  opacity: 0; transition: opacity .2s;
  padding: 0 .2rem;
}
.msg-row:hover .bubble-actions { opacity: 1; }
.bact {
  width: 24px; height: 24px; border-radius: 7px;
  background: rgba(15, 23, 42, 0.6); border: 1px solid var(--border);
  color: #94a3b8; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: .65rem; transition: all .18s;
}
.bact:hover { color: var(--purple-light); border-color: rgba(99, 102, 241, 0.3); background: rgba(99, 102, 241, 0.1); }

/* suggestion chips */
.chips { display: flex; flex-wrap: wrap; gap: .4rem; margin-top: .25rem; }
.chip {
  padding: .28rem .72rem; border-radius: 20px;
  border: 1px solid rgba(99, 102, 241, 0.2);
  background: rgba(99, 102, 241, 0.08);
  color: var(--purple-light); font-family: 'Poppins', sans-serif;
  font-size: .72rem; font-weight: 600;
  cursor: pointer; transition: all .2s; white-space: nowrap;
}
.chip:hover { background: rgba(99, 102, 241, 0.15); border-color: var(--purple-light); transform: translateY(-1px); }

/* typing cursor */
.typing-cursor {
  display: inline-block; width: 2px; height: .9em;
  background: var(--purple); margin-left: 2px;
  vertical-align: text-bottom;
  animation: blink .7s infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

/* ── LOADING OVERLAY ── */
#loading-overlay {
  position: absolute; inset: 0; z-index: 50;
  display: flex; align-items: center; justify-content: center;
  background: rgba(11, 15, 25, 0.7);
  backdrop-filter: blur(6px);
  pointer-events: none; opacity: 0;
  transition: opacity .3s;
}
#loading-overlay.active { opacity: 1; pointer-events: all; }

.hero-robot-wrap {
  display: flex; flex-direction: column; align-items: center; gap: .8rem;
  transform: translateY(-100px);
  transition: transform .8s cubic-bezier(.34,1.56,.64,1);
}
#loading-overlay.active .hero-robot-wrap { transform: translateY(0); }
#loading-overlay.flying-out .hero-robot-wrap { transform: translateY(-160px); transition: transform .55s cubic-bezier(.55,0,.1,1); }

/* robot SVG inline */
.load-robot-svg {
  width: 96px; height: 96px;
  filter: drop-shadow(0 0 18px rgba(99, 102, 241, 0.55));
  animation: fly-bob 1.8s ease-in-out infinite;
}
@keyframes fly-bob { 0%,100%{transform:translateY(0) rotate(-3deg)} 50%{transform:translateY(-12px) rotate(3deg)} }

/* flames */
.flames { display: flex; justify-content: center; gap: 4px; position: relative; height: 36px; }
.flame {
  border-radius: 50% 50% 20% 20%;
  transform-origin: bottom;
  animation: flick .35s ease-in-out infinite alternate;
}
.f1 { width: 16px; height: 32px; background: linear-gradient(to top, #3b82f6, #6366f1); }
.f2 { width: 12px; height: 24px; background: linear-gradient(to top, #6366f1, #818cf8); animation-delay:.12s; margin-top:6px; }
.f3 { width: 12px; height: 24px; background: linear-gradient(to top, #3b82f6, #93c5fd); animation-delay:.06s; margin-top:6px; }
@keyframes flick { from{transform:scaleX(1) scaleY(1)} to{transform:scaleX(1.2) scaleY(.85)} }

/* sparks */
.sparks { position: absolute; inset: -24px; pointer-events: none; }
.spark {
  position: absolute; width: 5px; height: 5px; border-radius: 50%;
  animation: spark-fly 1.1s ease-out infinite;
  left: 50%; top: 50%;
}
@keyframes spark-fly {
  0%{transform:translate(0,0) scale(1);opacity:1}
  100%{transform:translate(var(--tx),var(--ty)) scale(0);opacity:0}
}

.load-card {
  background: var(--white-bg);
  border: 1.5px solid var(--border);
  border-radius: 1.2rem;
  padding: .9rem 1.8rem;
  text-align: center;
  box-shadow: 0 8px 32px var(--shadow);
}
.load-text {
  font-size: .875rem; font-weight: 700; color: var(--text-dark);
}
.load-dots { display: inline-flex; gap: 3px; margin-left: 4px; }
.dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--purple-light); display: inline-block;
  animation: dot-b 1.1s ease-in-out infinite;
}
.dot:nth-child(2){animation-delay:.18s}
.dot:nth-child(3){animation-delay:.36s}
@keyframes dot-b { 0%,80%,100%{transform:scale(.55);opacity:.35} 40%{transform:scale(1.1);opacity:1} }

/* ── INPUT AREA ── */
.input-section {
  padding: .75rem 2.5rem 1.25rem;
  flex-shrink: 0;
}

.input-wrap {
  background: rgba(15, 23, 42, 0.6);
  border: 1.5px solid var(--border);
  border-radius: 1.5rem;
  padding: .9rem 1rem .9rem 1.2rem;
  display: flex; align-items: center; gap: .75rem;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
  transition: border-color .2s, box-shadow .2s;
}
.input-wrap:focus-within {
  border-color: rgba(99, 102, 241, 0.45);
  box-shadow: 0 8px 32px rgba(99, 102, 241, 0.15);
}

.input-add {
  width: 28px; height: 28px; border: none; background: none; cursor: pointer;
  color: var(--text-muted); font-size: 1.3rem; line-height: 1;
  display: flex; align-items: center; justify-content: center;
  transition: color .2s;
}
.input-add:hover { color: var(--purple-light); }

.input-field {
  flex: 1; border: none; outline: none;
  font-family: 'Poppins', sans-serif; font-size: .9rem;
  color: var(--text-dark); background: transparent; resize: none;
  max-height: 120px; line-height: 1.5;
}
.input-field::placeholder { color: #475569; }

.send-btn {
  width: 42px; height: 42px; border-radius: 12px;
  background: linear-gradient(135deg, #818cf8, #6366f1);
  border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  box-shadow: 0 4px 14px rgba(99, 102, 241, 0.25);
  transition: transform .15s, box-shadow .15s;
  color: #fff;
}
.send-btn:hover { transform: scale(1.07); box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4); }
.send-btn:disabled { opacity: .45; cursor: not-allowed; transform: none; }
.send-btn svg { width: 18px; height: 18px; stroke: #fff; fill: none; stroke-width: 2.5; }

/* action pills row */
.action-pills { display: flex; gap: .75rem; margin-top: .6rem; }
.pill {
  flex: 1; padding: .6rem .5rem;
  background: var(--pink-btn); border: 1px solid var(--border); border-radius: 3rem;
  font-family: 'Poppins', sans-serif; font-size: .78rem; font-weight: 700;
  color: #cbd5e1; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: .4rem;
  transition: background .2s, border-color .2s, transform .15s, color .2s;
}
.pill:hover { background: var(--pink-mid); border-color: rgba(99, 102, 241, 0.3); color: #ffffff; transform: translateY(-2px); }
.pill svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 1.8; flex-shrink: 0; }

/* scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: rgba(99, 102, 241, 0.15); border-radius: 2px; }

/* Mobile Bottom Navigation */
.mobile-nav {
  display: none;
  background: var(--pink-bg);
  border-top: 1px solid rgba(255, 255, 255, 0.05);
  height: 65px;
  justify-content: space-around;
  align-items: center;
  flex-shrink: 0;
  z-index: 100;
}
.mobile-nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0.2rem;
  color: var(--text-mid);
  cursor: pointer;
  flex: 1;
  height: 100%;
  font-size: 0.72rem;
  font-weight: 600;
  transition: color 0.2s;
}
.mobile-nav-item.active {
  color: var(--purple-light);
}
.mobile-nav-icon {
  width: 20px;
  height: 20px;
  stroke: currentColor;
  fill: none;
  stroke-width: 2;
}

@media (max-width: 768px) {
  body {
    padding: 0;
    margin: 0;
    overflow: hidden;
    background: #070a13;
  }
  .app-shell {
    width: 100% !important;
    max-width: 100% !important;
    height: 100vh !important;
    border-radius: 0 !important;
    box-shadow: none !important;
    flex-direction: column !important;
    background: #070a13 !important;
    border: none !important;
  }
  .sidebar {
    display: none !important;
  }
  .mobile-nav {
    display: flex !important;
    background: #121826 !important;
  }
  .main {
    padding: 0 !important; /* Let children manage padding */
    background: #0b0f19 !important;
  }
  .topbar {
    padding: 1.25rem 1.25rem 0.8rem !important;
  }
  .greeting-sub {
    display: none;
  }
  
  /* Chat Area responsiveness */
  .chat-area {
    padding: 1rem 1.25rem !important;
    gap: 0.9rem !important;
  }
  .bubble-wrap {
    max-width: 85% !important; /* wider bubbles on mobile */
  }
  .bubble {
    padding: 0.7rem 0.9rem !important;
    font-size: 0.82rem !important;
    line-height: 1.5 !important;
  }
  
  /* Input Area responsiveness */
  .input-section {
    padding: 0.5rem 1.25rem 1rem !important;
  }
  .input-wrap {
    padding: 0.6rem 0.8rem 0.6rem 1rem !important;
    border-radius: 1.25rem !important;
    gap: 0.5rem !important;
  }
  .input-field {
    font-size: 0.82rem !important;
  }
  
  /* Action pills horizontal scroll */
  .action-pills {
    overflow-x: auto;
    white-space: nowrap;
    display: flex;
    padding-bottom: 5px;
    gap: 0.5rem !important;
    width: 100%;
    scrollbar-width: none; /* Firefox */
  }
  .action-pills::-webkit-scrollbar {
    display: none; /* Chrome/Safari */
  }
  .pill {
    flex: 0 0 auto !important;
    padding: 0.5rem 1rem !important;
    font-size: 0.75rem !important;
  }
  
  /* Suggestion Chips scroll */
  .chips {
    overflow-x: auto;
    white-space: nowrap;
    display: flex;
    flex-wrap: nowrap !important;
    padding-bottom: 3px;
    gap: 0.4rem !important;
    width: 100%;
    scrollbar-width: none;
  }
  .chips::-webkit-scrollbar {
    display: none;
  }
  .chip {
    flex: 0 0 auto !important;
  }
  
  /* Projects and Recent views padding */
  #projects-view, #recent-view {
    padding: 1.25rem 1.25rem !important;
  }
  
  /* Welcome Screen robot size */
  .welcome-robot {
    width: 140px !important;
  }
  .welcome-text {
    font-size: 1.25rem !important;
  }
  #welcome-screen {
    padding-bottom: 60px !important;
  }
}
</style>
</head>
<body>

<div class="app-shell">

  <!-- ── SIDEBAR ── -->
  <aside class="sidebar">
    <div class="logo">
      <img src="logo.png" alt="Friday AI Logo">
      <span class="logo-text">Friday AI</span>
    </div>

    <ul class="nav">
      <li class="nav-item" id="nav-home">
        <svg class="nav-icon" viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>
        Home
      </li>
      <li class="nav-item active" id="nav-newchat">
        <svg class="nav-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        New Chat
      </li>
      <li class="nav-item" id="nav-projects">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
        </svg>
        Projects
      </li>
      <li class="nav-item" id="nav-recent">
        <svg class="nav-icon" viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
        Recent
      </li>
    </ul>

    <div class="profile">
      <span class="profile-label">Profile</span>
      <div class="avatar">
        <svg viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg">
          <rect width="36" height="36" fill="#f472b6"/>
          <circle cx="18" cy="14" r="7" fill="white" fill-opacity=".9"/>
          <path d="M4 34c0-7.732 6.268-14 14-14s14 6.268 14 14" fill="white" fill-opacity=".9"/>
        </svg>
      </div>
    </div>
  </aside>

  <!-- ── MAIN ── -->
  <main class="main">

    <!-- TOPBAR -->
    <div class="topbar">
      <div>
        <div class="greeting-title">Good Morning 🌸</div>
        <div class="greeting-sub">Ready to make today productive?</div>
      </div>
      <div class="topbar-right">
        <div class="mood-badge">
          <div class="mood-orb" id="mood-orb"></div>
          <span id="mood-text">Ready</span>
        </div>
        <button class="logout-btn">
          <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Logout
        </button>
      </div>

    <!-- 1. CHAT VIEW CONTAINER -->
    <div id="chat-view" style="flex:1; display:flex; flex-direction:column; overflow:hidden;">
      <!-- INNER WRAPPER (relative for overlays) -->
      <div style="position:relative;flex:1;overflow:hidden;display:flex;flex-direction:column;">

        <!-- WELCOME SCREEN -->
        <div id="welcome-screen">
          <img src="bg.png" class="welcome-robot" alt="Friday AI">
          <div class="welcome-text">
            Hey buddy !!!<br>
            What's on your mind?
          </div>
        </div>

        <!-- LOADING OVERLAY -->
        <div id="loading-overlay">
          <div class="hero-robot-wrap" id="hero-robot-wrap">
            <div class="sparks" id="sparks-container"></div>
            <img src="bg.png" class="welcome-robot" alt="Friday AI">
            <div class="flames">
              <div class="flame f2"></div>
              <div class="flame f1"></div>
              <div class="flame f2"></div>
              <div class="flame f3"></div>
            </div>
            <div class="load-card">
              <span class="load-text" id="loading-text">Friday AI is thinking</span>
              <span class="load-dots">
                <span class="dot"></span><span class="dot"></span><span class="dot"></span>
              </span>
            </div>
          </div>
        </div>

        <!-- CHAT MESSAGES -->
        <div class="chat-area" id="chat-area"></div>

      </div><!-- /inner wrapper -->

      <!-- INPUT SECTION -->
      <div class="input-section">
        <!-- File Preview Badge -->
        <div id="file-preview-badge" style="display:none; align-items:center; gap:6px; background:var(--pink-bg); border:1px solid rgba(99,102,241,0.3); border-radius:10px; padding:4px 8px; margin-bottom:8px; font-size:0.75rem; color:var(--purple-light); width:fit-content;">
          <i class="fas fa-paperclip"></i>
          <span id="file-preview-name">file.jpg</span>
          <i class="fas fa-times" id="btn-remove-file" style="cursor:pointer; color:#ef4444; margin-left:4px;"></i>
        </div>

        <div class="input-wrap">
          <button class="input-add" id="btn-add-file" aria-label="Add">+</button>
          <input type="file" id="file-uploader" style="display:none">
          <textarea class="input-field" id="input-field" rows="1"
            placeholder="Ask Friday AI anything....."></textarea>
          <button class="send-btn" id="send-btn" aria-label="Send">
            <svg viewBox="0 0 24 24">
              <line x1="5" y1="12" x2="19" y2="12"/>
              <polyline points="12 5 19 12 12 19"/>
            </svg>
          </button>
        </div>

        <div class="action-pills">
          <button class="pill" id="pill-image">
            <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
            Create image
          </button>
          <button class="pill" id="pill-write">
            <svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
            write or edit
          </button>
          <button class="pill" id="pill-lookup">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10A15.3 15.3 0 0112 2z"/></svg>
            look something up
          </button>

    </div>

    <!-- 2. PROJECTS VIEW CONTAINER -->
    <div id="projects-view" style="flex:1; display:none; flex-direction:column; overflow-y:auto; padding: 1.5rem 2.5rem;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 2rem;">
        <h2 style="font-family:'Poppins', sans-serif; font-weight:800; font-size:1.8rem; color:var(--text-dark);">Your Projects</h2>
        <button class="pill" id="btn-create-project" style="max-width:180px; padding: 0.6rem 1.2rem; background: var(--pink-btn);">
          <svg viewBox="0 0 24 24" style="width:16px; height:16px; stroke:currentColor; fill:none; stroke-width:2.5; margin-right:4px;"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
          Create Project
        </button>
      </div>
      <div id="projects-grid" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap:1.5rem;">
        <!-- Dynamic projects grid -->
      </div>
    </div>

    <!-- 3. RECENT CHATS VIEW CONTAINER -->
    <div id="recent-view" style="flex:1; display:none; flex-direction:column; overflow-y:auto; padding: 1.5rem 2.5rem;">
      <h2 style="font-family:'Poppins', sans-serif; font-weight:800; font-size:1.8rem; color:var(--text-dark); margin-bottom: 2rem;">Recent Conversations</h2>
      <div id="recent-list" style="display:flex; flex-direction:column; gap:1rem;">
        <!-- Dynamic recent conversations list -->
      </div>
    </div>

  </main>

  <!-- Mobile Bottom Navigation -->
  <nav class="mobile-nav">
     <div class="mobile-nav-item" id="m-nav-home">
        <svg class="mobile-nav-icon" viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>
        <span>Home</span>
     </div>
     <div class="mobile-nav-item active" id="m-nav-newchat">
        <svg class="mobile-nav-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span>New Chat</span>
     </div>
     <div class="mobile-nav-item" id="m-nav-projects">
        <svg class="mobile-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
        <span>Projects</span>
     </div>
     <div class="mobile-nav-item" id="m-nav-recent">
        <svg class="mobile-nav-icon" viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
        <span>Recent</span>
     </div>
  </nav>

</div>

<script>
// Authentication Check
const token = localStorage.getItem('friday_token');
const email = localStorage.getItem('friday_email');
if (!token) {
  window.location.href = "login.html";
} else {
  // Update user profile display
  const profileLabel = document.querySelector(".profile-label");
  if (profileLabel && email) {
    profileLabel.textContent = email.split('@')[0];
  }
}

// Logout Action
document.querySelector(".logout-btn").addEventListener("click", () => {
  localStorage.removeItem('friday_token');
  localStorage.removeItem('friday_email');
  localStorage.removeItem('friday_attached_file');
  window.location.href = "login.html";
});

// Production API Configuration
const API_BASE_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' ? '' : 'https://nexa-ai-909y.onrender.com';

// State Management
let currentSessionId = null;
let currentProjectId = null;
let chatStarted = false;

// Tab Navigation
const chatView = document.getElementById('chat-view');
const projectsView = document.getElementById('projects-view');
const recentView = document.getElementById('recent-view');

const navHome = document.getElementById('nav-home');
const navNewChat = document.getElementById('nav-newchat');
const navProjects = document.getElementById('nav-projects');
const navRecent = document.getElementById('nav-recent');

// Mobile Tab Navigation
const mNavHome = document.getElementById('m-nav-home');
const mNavNewChat = document.getElementById('m-nav-newchat');
const mNavProjects = document.getElementById('m-nav-projects');
const mNavRecent = document.getElementById('m-nav-recent');

function switchTab(tab) {
  // Reset active classes for desktop and mobile navigation
  [navHome, navNewChat, navProjects, navRecent, mNavHome, mNavNewChat, mNavProjects, mNavRecent].forEach(item => {
    if (item) item.classList.remove('active');
  });
  
  // Hide all views
  chatView.style.display = 'none';
  projectsView.style.display = 'none';
  recentView.style.display = 'none';
  
  if (tab === 'chat') {
    if (navNewChat) navNewChat.classList.add('active');
    if (mNavNewChat) mNavNewChat.classList.add('active');
    chatView.style.display = 'flex';
    const inputField = document.getElementById('input-field');
    if (inputField) inputField.focus();
  } else if (tab === 'projects') {
    if (navProjects) navProjects.classList.add('active');
    if (mNavProjects) mNavProjects.classList.add('active');
    projectsView.style.display = 'flex';
    loadProjects();
  } else if (tab === 'recent') {
    if (navRecent) navRecent.classList.add('active');
    if (mNavRecent) mNavRecent.classList.add('active');
    recentView.style.display = 'flex';
    loadRecentChats();
  }
}

if (navHome) navHome.onclick = () => window.location.href = 'main.html';
if (mNavHome) mNavHome.onclick = () => window.location.href = 'main.html';

if (mNavProjects) mNavProjects.onclick = () => switchTab('projects');
if (mNavRecent) mNavRecent.onclick = () => switchTab('recent');

const welcomeScreen = document.getElementById('welcome-screen');

if (navNewChat || mNavNewChat) {
  const handleNewChatClick = () => {
    currentSessionId = null;
    currentProjectId = null;
    chatArea.innerHTML = '';
    
    // Reset welcome text
    const welcomeText = document.querySelector('.welcome-text');
    if (welcomeText) {
      welcomeText.innerHTML = `Hey buddy !!!<br>What's on your mind?`;
    }
    
    welcomeScreen.classList.remove('hiding');
    welcomeScreen.style.display = 'flex';
    chatStarted = false;
    
    // Clear URL parameters
    const url = new URL(window.location);
    url.searchParams.delete('q');
    url.searchParams.delete('session');
    url.searchParams.delete('tab');
    window.history.pushState({}, '', url);

    switchTab('chat');
  };
  if (navNewChat) navNewChat.onclick = handleNewChatClick;
  if (mNavNewChat) mNavNewChat.onclick = handleNewChatClick;
}
if (navProjects) navProjects.onclick = () => switchTab('projects');
if (navRecent) navRecent.onclick = () => switchTab('recent');

// ── MOOD ──
const moodOrb  = document.getElementById('mood-orb');
const moodText = document.getElementById('mood-text');
function setMood(m) {
  if (!moodOrb || !moodText) return;
  moodOrb.className = 'mood-orb' + (m !== 'ready' ? ' ' + m : '');
  moodText.textContent = { ready:'Ready', thinking:'Thinking...', generating:'Generating' }[m] || 'Ready';
}

// ── LOADING PHRASES ──
const phrases = [
  'Friday AI is thinking',
  'Finding the best answer',
  'Cooking something smart ✨',
  'Searching the cosmos',
  'Almost there'
];
let phraseTimer;
function startPhrases() {
  const loadingText = document.getElementById('loading-text');
  if (!loadingText) return;
  let i = 0;
  loadingText.textContent = phrases[0];
  phraseTimer = setInterval(() => {
    i = (i+1) % phrases.length;
    loadingText.textContent = phrases[i];
  }, 1800);
}
function stopPhrases() { clearInterval(phraseTimer); }

// ── SPARKS ──
function makeSparks() {
  const c = document.getElementById('sparks-container');
  if (!c) return;
  c.innerHTML = '';
  const cols = ['#6366f1','#818cf8','#38bdf8','#a78bfa','#06b6d4'];
  for (let i = 0; i < 12; i++) {
    const s = document.createElement('div');
    s.className = 'spark';
    const angle = Math.random() * 360;
    const dist  = 38 + Math.random() * 48;
    s.style.cssText = `
      left:50%;top:50%;
      --tx:${Math.cos(angle*Math.PI/180)*dist}px;
      --ty:${Math.sin(angle*Math.PI/180)*dist}px;
      background:${cols[Math.floor(Math.random()*cols.length)]};
      animation-delay:${Math.random()*1.1}s;
    `;
    c.appendChild(s);
  }
}

// ── SHOW/HIDE LOADING ──
const loadingOverlay = document.getElementById('loading-overlay');
function showLoading() {
  setMood('thinking');
  makeSparks();
  startPhrases();
  if (loadingOverlay) {
    loadingOverlay.classList.remove('flying-out');
    loadingOverlay.classList.add('active');
  }
  setTimeout(() => setMood('generating'), 1400);
}
function hideLoading() {
  return new Promise(res => {
    stopPhrases();
    if (loadingOverlay) {
      loadingOverlay.classList.add('flying-out');
      setTimeout(() => {
        loadingOverlay.classList.remove('active','flying-out');
        setMood('ready');
        res();
      }, 620);
    } else {
      setMood('ready');
      res();
    }
  });
}

// ── TEXTAREA AUTO-RESIZE ──
const inputField = document.getElementById('input-field');
if (inputField) {
  inputField.addEventListener('input', () => {
    inputField.style.height = 'auto';
    inputField.style.height = Math.min(inputField.scrollHeight, 120) + 'px';
  });
}

// ── WELCOME HIDE ──
function hideWelcome() {
  if (welcomeScreen) {
    welcomeScreen.classList.add('hiding');
    setTimeout(() => welcomeScreen.style.display = 'none', 500);
  }
  chatStarted = true;
}

// ── APPEND MESSAGE ──
const chatArea = document.getElementById('chat-area');
function appendMsg(role, html, chips = [], attachedFileName = null) {
  if (!chatArea) return;
  const row = document.createElement('div');
  row.className = 'msg-row' + (role === 'user' ? ' user' : '');

  // avatar
  const av = document.createElement('div');
  av.className = 'msg-avatar ' + (role === 'user' ? 'user-av' : 'friday-av');
  if (role === 'user') {
    av.innerHTML = `<svg viewBox="0 0 36 36"><rect width="36" height="36" fill="#818cf8"/><circle cx="18" cy="14" r="7" fill="white" fill-opacity=".9"/><path d="M4 34c0-7.732 6.268-14 14-14s14 6.268 14 14" fill="white" fill-opacity=".9"/></svg>`;
  } else {
    av.textContent = 'F';
  }

  const wrap = document.createElement('div');
  wrap.className = 'bubble-wrap';

  const bubble = document.createElement('div');
  bubble.className = 'bubble ' + (role === 'user' ? 'user-bubble' : 'friday-bubble');
  
  if (role === 'user' && attachedFileName) {
    bubble.innerHTML = `
      <div style="display:flex; align-items:center; gap:8px; background:rgba(255,255,255,0.15); padding:6px 12px; border-radius:10px; margin-bottom:6px; font-size:0.8rem;">
        <i class="fas fa-file"></i>
        <span style="font-weight:600;">${esc(attachedFileName)}</span>
      </div>
      <div>${html}</div>
    `;
  } else {
    bubble.innerHTML = html;
  }
  
  wrap.appendChild(bubble);

  if (role === 'nexa' || role === 'friday') {
    // action buttons
    const acts = document.createElement('div');
    acts.className = 'bubble-actions';
    acts.innerHTML = `
      <button class="bact" title="Copy"       onclick="copyBubble(this)"><i class="fas fa-copy"></i></button>
      <button class="bact" title="Speak"      onclick="speakBubble(this)"><i class="fas fa-volume-up"></i></button>
      <button class="bact" title="Like"       ><i class="fas fa-thumbs-up"></i></button>
      <button class="bact" title="Dislike"    ><i class="fas fa-thumbs-down"></i></button>
      <button class="bact" title="Regenerate"><i class="fas fa-rotate-right"></i></button>
    `;
    wrap.appendChild(acts);

    if (chips.length) {
      const cd = document.createElement('div');
      cd.className = 'chips';
      chips.forEach(c => {
        const btn = document.createElement('button');
        btn.className = 'chip';
        btn.textContent = c;
        btn.onclick = () => sendMessage(c);
        cd.appendChild(btn);
      });
      wrap.appendChild(cd);
    }
  }

  row.appendChild(av);
  row.appendChild(wrap);
  chatArea.appendChild(row);
  chatArea.scrollTop = chatArea.scrollHeight;
  return bubble;
}

// ── TYPING EFFECT ──
async function typeText(el, text, speed = 17) {
  el.innerHTML = '';
  const cursor = document.createElement('span');
  cursor.className = 'typing-cursor';
  el.appendChild(cursor);

  function fmt(ch) {
    if (ch === '\n') return '<br>';
    return ch.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  for (let i = 0; i < text.length; i++) {
    const span = document.createElement('span');
    span.innerHTML = fmt(text[i]);
    cursor.before(span);
    if (chatArea) chatArea.scrollTop = chatArea.scrollHeight;
    await new Promise(r => setTimeout(r, speed));
  }

  // basic bold & code pass after typing
  const raw = el.innerText;
  el.innerHTML = raw
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/`(.*?)`/g,'<code style="background:rgba(99,102,241,0.15);padding:1px 6px;border-radius:5px;font-size:.82em">$1</code>')
    .replace(/\n/g,'<br>');
  cursor.remove();
}

// ── SEND ──
const sendBtn = document.getElementById('send-btn');
let busy = false;

async function sendMessage(text) {
  text = (text || inputField.value).trim();
  if (!text || busy) return;
  busy = true;
  if (sendBtn) sendBtn.disabled = true;

  if (!chatStarted) hideWelcome();

  if (inputField) {
    inputField.value = '';
    inputField.style.height = 'auto';
  }

  // Check file attachment
  let attachedFileName = null;
  const fileUploader = document.getElementById('file-uploader');
  const filePreviewBadge = document.getElementById('file-preview-badge');
  
  if (fileUploader && fileUploader.files.length > 0) {
    attachedFileName = fileUploader.files[0].name;
    fileUploader.value = '';
    if (filePreviewBadge) filePreviewBadge.style.display = 'none';
  } else {
    // Check forwarded file
    const storedFile = localStorage.getItem('friday_attached_file');
    if (storedFile) {
      attachedFileName = storedFile;
      localStorage.removeItem('friday_attached_file');
    }
  }

  appendMsg('user', esc(text), [], attachedFileName);
  showLoading();

  try {
    const response = await fetch(`${API_BASE_URL}/api/chat/message`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${token}`
      },
      body: JSON.stringify({
        message: text,
        sessionId: currentSessionId,
        projectId: currentProjectId
      })
    });

    const data = await response.json();
    await hideLoading();

    if (!response.ok) {
      throw new Error(data.error || 'Server error');
    }

    currentSessionId = data.sessionId;

    // Update URL params
    const url = new URL(window.location);
    url.searchParams.set('session', currentSessionId);
    window.history.pushState({}, '', url);

    const defaultChips = ['Go deeper', 'Give examples', 'Simplify this'];
    const bubble = appendMsg('friday', '', defaultChips);
    await typeText(bubble, data.response, 12);

  } catch (error) {
    await hideLoading();
    console.error('Chat error:', error);
    const bubble = appendMsg('friday', '', []);
    await typeText(bubble, "Sorry, I had trouble connecting. " + error.message, 12);
  }

  busy = false;
  if (sendBtn) sendBtn.disabled = false;
  if (inputField) inputField.focus();
}

if (sendBtn) sendBtn.addEventListener('click', () => sendMessage());
if (inputField) {
  inputField.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function copyBubble(btn) {
  const b = btn.closest('.bubble-wrap').querySelector('.bubble');
  navigator.clipboard.writeText(b.innerText).then(() => {
    btn.innerHTML = '<i class="fas fa-check"></i>';
    setTimeout(() => btn.innerHTML = '<i class="fas fa-copy"></i>', 1500);
  });
}

function speakBubble(btn) {
  const b = btn.closest('.bubble-wrap').querySelector('.bubble');
  const u = new SpeechSynthesisUtterance(b.innerText);
  u.rate = 1.05; speechSynthesis.speak(u);
  btn.innerHTML = '<i class="fas fa-stop"></i>';
  u.onend = () => btn.innerHTML = '<i class="fas fa-volume-up"></i>';
}

// ── RECENT CHATS API CALLS ──
async function loadRecentChats() {
  const recentList = document.getElementById('recent-list');
  if (!recentList) return;
  recentList.innerHTML = '<div style="color:var(--text-muted);">Loading conversations...</div>';
  
  try {
    const res = await fetch(`${API_BASE_URL}/api/chat/sessions`, {
      headers: { 'Authorization': `Bearer ${token}` }
    });
    const sessions = await res.json();
    
    if (sessions.length === 0) {
      recentList.innerHTML = '<div style="color:var(--text-muted); text-align:center; padding: 2rem;">No recent chats found. Start a new conversation!</div>';
      return;
    }
    
    recentList.innerHTML = '';
    sessions.forEach(sess => {
      const div = document.createElement('div');
      div.style.cssText = `
        background: var(--white-bg);
        border: 1px solid var(--border);
        border-radius: 1.2rem;
        padding: 1.2rem 1.6rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        cursor: pointer;
        transition: transform 0.2s, box-shadow 0.2s;
        box-shadow: 0 4px 12px var(--shadow);
      `;
      div.onmouseover = () => {
        div.style.transform = 'translateY(-2px)';
        div.style.boxShadow = '0 6px 18px rgba(168,85,247,.18)';
      };
      div.onmouseout = () => {
        div.style.transform = 'none';
        div.style.boxShadow = '0 4px 12px var(--shadow)';
      };
      
      div.onclick = (e) => {
        if (e.target.closest('.delete-sess-btn')) return;
        loadChatSession(sess._id);
      };

      const dateStr = new Date(sess.updatedAt).toLocaleDateString(undefined, {
        month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
      });
      
      div.innerHTML = `
        <div>
          <h4 style="font-weight:600; color:var(--text-dark); margin-bottom:0.25rem;">${esc(sess.title)}</h4>
          <span style="font-size:0.75rem; color:var(--text-muted);">${dateStr}</span>
        </div>
        <button class="delete-sess-btn bact" style="opacity: 1;" title="Delete Chat" onclick="deleteChatSession(event, '${sess._id}')">
          <i class="fas fa-trash" style="color:#ef4444;"></i>
        </button>
      `;
      recentList.appendChild(div);
    });
  } catch (err) {
    console.error(err);
    recentList.innerHTML = '<div style="color:#ef4444;">Failed to load conversations.</div>';
  }
}

async function deleteChatSession(e, sessionId) {
  e.stopPropagation();
  if (!confirm('Are you sure you want to delete this chat history?')) return;
  
  try {
    const res = await fetch(`${API_BASE_URL}/api/chat/sessions/${sessionId}`, {
      method: 'DELETE',
      headers: { 'Authorization': `Bearer ${token}` }
    });
    if (res.ok) {
      if (currentSessionId === sessionId) {
        navNewChat.click();
      } else {
        loadRecentChats();
      }
    }
  } catch (err) {
    console.error(err);
    alert('Failed to delete chat session.');
  }
}

async function loadChatSession(sessionId) {
  showLoading();
  try {
    const res = await fetch(`${API_BASE_URL}/api/chat/sessions/${sessionId}`, {
      headers: { 'Authorization': `Bearer ${token}` }
    });
    const session = await res.json();
    
    chatArea.innerHTML = '';
    currentSessionId = session._id;
    currentProjectId = session.projectId;
    
    if (session.messages && session.messages.length > 0) {
      hideWelcome();
      session.messages.forEach(msg => {
        const html = esc(msg.content)
          .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
          .replace(/`(.*?)`/g,'<code style="background:rgba(99,102,241,0.15);padding:1px 6px;border-radius:5px;font-size:.82em">$1</code>')
          .replace(/\n/g,'<br>');
        appendMsg(msg.role, html);
      });
    } else {
      welcomeScreen.classList.remove('hiding');
      welcomeScreen.style.display = 'flex';
      chatStarted = false;
    }
    
    // Update URL
    const url = new URL(window.location);
    url.searchParams.set('session', currentSessionId);
    url.searchParams.delete('tab');
    window.history.pushState({}, '', url);

    switchTab('chat');
  } catch (err) {
    console.error(err);
    alert('Failed to load chat history.');
  } finally {
    hideLoading();
  }
}

// ── PROJECTS API CALLS ──
async function loadProjects() {
  const grid = document.getElementById('projects-grid');
  if (!grid) return;
  grid.innerHTML = '<div style="color:var(--text-muted);">Loading projects...</div>';
  
  try {
    const res = await fetch(`${API_BASE_URL}/api/projects`, {
      headers: { 'Authorization': `Bearer ${token}` }
    });
    const projects = await res.json();
    
    if (projects.length === 0) {
      grid.innerHTML = '<div style="color:var(--text-muted); text-align:center; padding: 2rem; grid-column: 1/-1;">No projects found. Create one to get started!</div>';
      return;
    }
    
    grid.innerHTML = '';
    projects.forEach(proj => {
      const card = document.createElement('div');
      card.style.cssText = `
        background: var(--white-bg);
        border: 1.5px solid var(--border);
        border-radius: 1.5rem;
        padding: 1.5rem;
        display: flex;
        flex-direction: column;
        gap: 0.8rem;
        box-shadow: 0 6px 18px var(--shadow);
        transition: transform 0.2s, box-shadow 0.2s;
      `;
      card.onmouseover = () => {
        card.style.transform = 'translateY(-3px)';
        card.style.boxShadow = '0 8px 24px rgba(168,85,247,.2)';
      };
      card.onmouseout = () => {
        card.style.transform = 'none';
        card.style.boxShadow = '0 6px 18px var(--shadow)';
      };
      
      card.innerHTML = `
        <div style="display:flex; justify-content:space-between; align-items:flex-start;">
          <div style="width:36px; height:36px; border-radius:10px; background:var(--purple-pale); display:flex; align-items:center; justify-content:center; color:var(--purple);">
            <i class="fas fa-folder-open"></i>
          </div>
          <button class="bact" style="opacity: 1;" title="Delete Project" onclick="deleteProject(event, '${proj._id}')">
            <i class="fas fa-trash" style="color:#ef4444;"></i>
          </button>
        </div>
        <div>
          <h4 style="font-weight:700; color:var(--text-dark); margin-bottom:0.25rem;">${esc(proj.name)}</h4>
          <p style="font-size:0.8rem; color:var(--text-mid); height:40px; overflow:hidden; text-overflow:ellipsis; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;">${esc(proj.description || 'No description')}</p>
        </div>
        <button class="pill" style="margin-top:auto; font-size:0.8rem; padding:0.5rem; background: var(--pink-btn);" onclick="startProjectChat('${proj._id}', '${esc(proj.name)}')">
          <i class="fas fa-comment-dots" style="font-size:0.9em; margin-right:4px;"></i> Chat in Project
        </button>
      `;
      grid.appendChild(card);
    });
  } catch (err) {
    console.error(err);
    grid.innerHTML = '<div style="color:#ef4444;">Failed to load projects.</div>';
  }
}

document.getElementById('btn-create-project').onclick = async () => {
  const name = prompt('Enter project name:');
  if (!name) return;
  const description = prompt('Enter project description (optional):') || '';
  
  try {
    const res = await fetch(`${API_BASE_URL}/api/projects/create`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${token}`
      },
      body: JSON.stringify({ name, description })
    });
    
    if (res.ok) {
      loadProjects();
    } else {
      const data = await res.json();
      alert('Error: ' + data.error);
    }
  } catch (err) {
    console.error(err);
    alert('Failed to create project.');
  }
};

async function deleteProject(e, projectId) {
  e.stopPropagation();
  if (!confirm('Are you sure you want to delete this project? Chat histories inside this project will be kept but unlinked.')) return;
  
  try {
    const res = await fetch(`${API_BASE_URL}/api/projects/${projectId}`, {
      method: 'DELETE',
      headers: { 'Authorization': `Bearer ${token}` }
    });
    if (res.ok) {
      loadProjects();
    }
  } catch (err) {
    console.error(err);
    alert('Failed to delete project.');
  }
}

function startProjectChat(projectId, projectName) {
  currentSessionId = null;
  currentProjectId = projectId;
  chatArea.innerHTML = '';
  
  const welcomeText = document.querySelector('.welcome-text');
  if (welcomeText) {
    welcomeText.innerHTML = `Welcome to project:<br><span style="color:var(--purple-light); font-weight:700;">${projectName}</span>`;
  }
  
  welcomeScreen.classList.remove('hiding');
  welcomeScreen.style.display = 'flex';
  chatStarted = false;
  
  const url = new URL(window.location);
  url.searchParams.delete('q');
  url.searchParams.delete('session');
  url.searchParams.delete('tab');
  window.history.pushState({}, '', url);

  switchTab('chat');
}

// ── FILE UPLOADER HANDLERS ──
const btnAddFile = document.getElementById('btn-add-file');
const fileUploader = document.getElementById('file-uploader');
const filePreviewBadge = document.getElementById('file-preview-badge');
const filePreviewName = document.getElementById('file-preview-name');
const btnRemoveFile = document.getElementById('btn-remove-file');

if (btnAddFile && fileUploader) {
  btnAddFile.onclick = () => fileUploader.click();
  
  fileUploader.onchange = () => {
    if (fileUploader.files.length > 0) {
      filePreviewName.textContent = fileUploader.files[0].name;
      filePreviewBadge.style.display = 'flex';
    }
  };
}

if (btnRemoveFile && fileUploader) {
  btnRemoveFile.onclick = () => {
    fileUploader.value = '';
    filePreviewBadge.style.display = 'none';
    localStorage.removeItem('friday_attached_file');
  };
}

// ── ACTION PILLS HANDLERS ──
const pillImage = document.getElementById('pill-image');
const pillWrite = document.getElementById('pill-write');
const pillLookup = document.getElementById('pill-lookup');

if (inputField) {
  if (pillImage) {
    pillImage.onclick = () => {
      inputField.value = "Create an image of ";
      inputField.focus();
      inputField.dispatchEvent(new Event('input'));
    };
  }
  if (pillWrite) {
    pillWrite.onclick = () => {
      inputField.value = "Write a summary of ";
      inputField.focus();
      inputField.dispatchEvent(new Event('input'));
    };
  }
  if (pillLookup) {
    pillLookup.onclick = () => {
      inputField.value = "Look up information about ";
      inputField.focus();
      inputField.dispatchEvent(new Event('input'));
    };
  }
}

// ── URL PARSING & INITIAL LOAD ──
const urlParams = new URLSearchParams(window.location.search);
const tabQ = urlParams.get('tab');
const urlQ = urlParams.get('q');
const sessionQ = urlParams.get('session');

if (tabQ) {
  switchTab(tabQ);
} else if (sessionQ) {
  loadChatSession(sessionQ);
} else {
  switchTab('chat');
}

if (urlQ) {
  setTimeout(() => sendMessage(decodeURIComponent(urlQ)), 350);
}
</script>
